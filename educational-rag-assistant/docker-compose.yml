version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: educational_rag_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-educational_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-educational_rag_pass}
      POSTGRES_DB: ${POSTGRES_DB:-educational_rag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educational_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: educational_rag_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  postgres_data:
  qdrant_data: